<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Live Queues')}"></head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 hidden md:flex flex-col">
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-700">
            <i class="bi bi-heart-pulse-fill text-primary text-xl mr-2"></i>
            <span class="text-lg font-bold">VirtualQueue</span>
        </div>
        <nav class="flex-grow py-4 px-3 space-y-1">
            <a th:href="@{/admin/dashboard}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-grid-1x2-fill mr-3"></i> Dashboard
            </a>
            <a th:href="@{/admin/doctors}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-person-badge mr-3"></i> Manage Doctors
            </a>
            <a th:href="@{/admin/patients}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-people mr-3"></i> Manage Patients
            </a>
            <a th:href="@{/admin/appointments}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-calendar-event mr-3"></i> Appointments
            </a>
            <a th:href="@{/admin/queues}" class="flex items-center px-3 py-2 text-primary bg-primary/10 rounded-lg font-medium">
                <i class="bi bi-list-ol mr-3"></i> Live Queues
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200 dark:border-gray-700">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="flex items-center w-full px-3 py-2 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg font-medium transition-colors">
                    <i class="bi bi-box-arrow-right mr-3"></i> Logout
                </button>
            </form>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-6">
            <h1 class="text-xl font-semibold">Live Queues</h1>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="bi bi-moon"></i>
                </button>
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold">
                        A
                    </div>
                    <span class="ml-2 font-medium text-sm hidden sm:block" sec:authentication="name">Admin User</span>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6">
            <div class="card p-6">
                <div class="flex flex-col sm:flex-row justify-between items-center mb-6 space-y-4 sm:space-y-0">
                    <h2 class="text-lg font-bold">All Active Queues</h2>
                    <div class="flex items-center space-x-4">
                        <div class="relative">
                            <i class="bi bi-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" data-table-search="queuesTable" placeholder="Search queues..." class="pl-10 pr-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 text-sm focus:outline-none focus:ring-2 focus:ring-primary w-full sm:w-64 transition-all">
                        </div>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table id="queuesTable" class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-sm text-gray-500 border-b border-gray-200 dark:border-gray-700">
                                <th class="pb-3 font-medium">Doctor</th>
                                <th class="pb-3 font-medium">Q No.</th>
                                <th class="pb-3 font-medium">Patient Name</th>
                                <th class="pb-3 font-medium">Type</th>
                                <th class="pb-3 font-medium">Status</th>
                            </tr>
                        </thead>
                        <tbody class="text-sm">
                            <tr th:if="${#lists.isEmpty(queues)}">
                                <td colspan="5" class="py-4 text-center text-gray-500">No active queues found.</td>
                            </tr>
                            <tr th:each="q : ${queues}" class="border-b border-gray-100 dark:border-gray-800" th:classappend="${q.status == 'IN_PROGRESS'} ? 'bg-blue-50 dark:bg-blue-900/20'">
                                <td class="py-3 font-medium text-gray-900 dark:text-white" th:text="${'Dr. ' + q.appointment.doctor.lastName}">Dr. Smith</td>
                                <td class="py-3 font-bold text-blue-600" th:text="${q.queueNumber}">1</td>
                                <td class="py-3" th:text="${q.appointment.patient.firstName + ' ' + q.appointment.patient.lastName}">Jane Doe</td>
                                <td class="py-3">
                                    <span th:if="${q.priorityLevel == 'EMERGENCY'}" class="text-red-500 font-medium">Emergency</span>
                                    <span th:if="${q.priorityLevel != 'EMERGENCY'}" class="text-gray-500">Normal</span>
                                </td>
                                <td class="py-3">
                                    <span th:if="${q.status == 'WAITING'}" class="px-2 py-1 bg-orange-100 text-orange-700 rounded-md text-xs font-medium">Waiting</span>
                                    <span th:if="${q.status == 'IN_PROGRESS'}" class="px-2 py-1 bg-blue-100 text-blue-700 rounded-md text-xs font-medium">In Progress</span>
                                    <span th:if="${q.status == 'COMPLETED'}" class="px-2 py-1 bg-green-100 text-green-700 rounded-md text-xs font-medium">Completed</span>
                                    <span th:if="${q.status == 'CANCELLED'}" class="px-2 py-1 bg-red-100 text-red-700 rounded-md text-xs font-medium">Cancelled</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
