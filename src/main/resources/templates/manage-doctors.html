<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Manage Doctors')}"></head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 hidden md:flex flex-col">
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-700">
            <i class="bi bi-heart-pulse-fill text-primary text-xl mr-2"></i>
            <span class="text-lg font-bold">VirtualQueue</span>
        </div>
        <nav class="flex-grow py-4 px-3 space-y-1">
            <a th:href="@{/admin/dashboard}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-grid-1x2-fill mr-3"></i> Dashboard
            </a>
            <a th:href="@{/admin/doctors}" class="flex items-center px-3 py-2 text-primary bg-primary/10 rounded-lg font-medium">
                <i class="bi bi-person-badge mr-3"></i> Manage Doctors
            </a>
            <a th:href="@{/admin/patients}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-people mr-3"></i> Manage Patients
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200 dark:border-gray-700">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="flex items-center w-full px-3 py-2 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg font-medium transition-colors">
                    <i class="bi bi-box-arrow-right mr-3"></i> Logout
                </button>
            </form>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <!-- Top header -->
        <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-6">
            <h1 class="text-xl font-semibold">Manage Doctors</h1>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="bi bi-moon"></i>
                </button>
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold">
                        A
                    </div>
                    <span class="ml-2 font-medium text-sm hidden sm:block" sec:authentication="name">Admin User</span>
                </div>
            </div>
        </header>

        <!-- Main section -->
        <main class="flex-1 overflow-y-auto p-6">
            <div class="card p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-lg font-bold">All Doctors</h2>
                    <button class="btn-primary py-2 px-4 text-sm"><i class="bi bi-plus-lg mr-2"></i>Add Doctor</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-sm text-gray-500 border-b border-gray-200 dark:border-gray-700">
                                <th class="pb-3 font-medium">Name</th>
                                <th class="pb-3 font-medium">Email</th>
                                <th class="pb-3 font-medium">Specialization</th>
                                <th class="pb-3 font-medium">Phone</th>
                                <th class="pb-3 font-medium">Experience</th>
                                <th class="pb-3 font-medium text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="text-sm">
                            <tr th:if="${#lists.isEmpty(doctors)}">
                                <td colspan="6" class="py-4 text-center text-gray-500">No doctors found.</td>
                            </tr>
                            <tr th:each="doctor : ${doctors}" class="border-b border-gray-100 dark:border-gray-800">
                                <td class="py-3 font-medium" th:text="${'Dr. ' + doctor.firstName + ' ' + doctor.lastName}">Dr. Smith</td>
                                <td class="py-3 text-gray-500 dark:text-gray-400" th:text="${doctor.user.email}">doc@mail.com</td>
                                <td class="py-3" th:text="${doctor.specialization}">Cardiologist</td>
                                <td class="py-3" th:text="${doctor.phone}">555-1234</td>
                                <td class="py-3" th:text="${doctor.experienceYears + ' yrs'}">10 yrs</td>
                                <td class="py-3 text-right">
                                    <button class="text-blue-600 hover:text-blue-800 mr-3"><i class="bi bi-pencil-square"></i></button>
                                    <button class="text-red-600 hover:text-red-800"><i class="bi bi-trash"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
