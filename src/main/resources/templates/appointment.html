<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Book Appointment')}"></head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col md:flex-row">

    <!-- Sidebar -->
    <aside class="w-full md:w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex-col hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-700">
            <i class="bi bi-heart-pulse-fill text-primary text-xl mr-2"></i>
            <span class="text-lg font-bold">VirtualQueue</span>
        </div>
        <nav class="flex-grow py-4 px-3 space-y-1">
            <a th:href="@{/patient/dashboard}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-grid-1x2-fill mr-3"></i> Dashboard
            </a>
            <a th:href="@{/patient/book-appointment}" class="flex items-center px-3 py-2 text-primary bg-primary/10 rounded-lg font-medium">
                <i class="bi bi-calendar-plus mr-3"></i> Book Appointment
            </a>
            <a th:href="@{/patient/appointments}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-journal-medical mr-3"></i> My Appointments
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200 dark:border-gray-700">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="flex items-center w-full px-3 py-2 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg font-medium transition-colors">
                    <i class="bi bi-box-arrow-right mr-3"></i> Logout
                </button>
            </form>
        </div>
    </aside>

    <!-- Mobile Nav Header -->
    <div class="md:hidden flex items-center justify-between p-4 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
        <div class="flex items-center">
            <i class="bi bi-heart-pulse-fill text-primary text-xl mr-2"></i>
            <span class="text-lg font-bold">VirtualQueue</span>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="text-red-500"><i class="bi bi-box-arrow-right text-xl"></i></button>
        </form>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 hidden md:flex items-center justify-between px-6">
            <h1 class="text-xl font-semibold">Book Appointment</h1>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="bi bi-moon"></i>
                </button>
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-green-500 text-white flex items-center justify-center font-bold" th:text="${patientName != null ? #strings.substring(patientName, 0, 1) : 'P'}">
                        P
                    </div>
                    <span class="ml-2 font-medium text-sm hidden sm:block" sec:authentication="name">Patient User</span>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-6">
            
            <div th:if="${param.error}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6" role="alert">
                <p>Failed to book appointment. Please check your selections and try again.</p>
            </div>

            <div class="card p-6 md:p-8 max-w-3xl mx-auto">
                <h2 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white">Schedule New Visit</h2>
                
                <form th:action="@{/patient/book-appointment}" method="post" class="space-y-6">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Doctor Selection -->
                        <div class="space-y-2">
                            <label for="doctorId" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Select Doctor</label>
                            <select id="doctorId" name="doctorId" required class="input-field w-full">
                                <option value="" disabled selected>Choose a doctor...</option>
                                <option th:each="doc : ${doctors}" th:value="${doc.id}" th:text="${'Dr. ' + doc.firstName + ' ' + doc.lastName + ' (' + doc.specialization + ')'}">Dr. Smith</option>
                            </select>
                        </div>
                        
                        <!-- Appointment Type -->
                        <div class="space-y-2">
                            <label for="type" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Visit Type</label>
                            <select id="type" name="type" required class="input-field w-full">
                                <option value="NORMAL" selected>Routine / Normal</option>
                                <option value="EMERGENCY">Emergency / Priority</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- Date -->
                        <div class="space-y-2">
                            <label for="appointmentDate" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Preferred Date</label>
                            <input type="date" id="appointmentDate" name="appointmentDate" required class="input-field w-full" th:min="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}">
                        </div>
                        
                        <!-- Time -->
                        <div class="space-y-2">
                            <label for="timeSlot" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Preferred Time</label>
                            <input type="time" id="timeSlot" name="timeSlot" required class="input-field w-full">
                        </div>
                    </div>

                    <!-- Reason -->
                    <div class="space-y-2">
                        <label for="reason" class="block text-sm font-medium text-gray-700 dark:text-gray-300">Reason for Visit (Brief description)</label>
                        <textarea id="reason" name="reason" rows="3" required class="input-field w-full" placeholder="e.g. Regular checkup, mild fever..."></textarea>
                    </div>

                    <div class="pt-4 border-t border-gray-200 dark:border-gray-700 flex justify-end">
                        <button type="submit" class="btn-primary py-2 px-8 text-lg font-medium shadow-lg shadow-primary/30">
                            Confirm Booking <i class="bi bi-arrow-right ml-2"></i>
                        </button>
                    </div>
                </form>
            </div>
            
        </main>
    </div>

    <!-- Script to set minimum date to today -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var today = new Date().toISOString().split('T')[0];
            document.getElementById("appointmentDate").setAttribute('min', today);
        });
    </script>
</body>
</html>
