<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Register')}"></head>
<body class="min-h-screen flex flex-col bg-gray-50 dark:bg-gray-900">
    
    <nav th:replace="~{fragments :: navbar}"></nav>

    <main class="flex-grow flex items-center justify-center p-6 relative">
        <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-primary/5 to-purple-500/5 z-0"></div>
        
        <div class="card p-8 w-full max-w-lg z-10 glass-panel mt-10 mb-10">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary/10 text-primary mb-4">
                    <i class="bi bi-person-plus text-2xl"></i>
                </div>
                <h2 class="text-3xl font-bold">Create an account</h2>
                <p class="text-gray-500 dark:text-gray-400 mt-2">Join Virtual Queue today</p>
            </div>

            <div th:if="${param.success}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative mb-4" role="alert">
                <span class="block sm:inline">Registration successful! You can now login.</span>
            </div>

            <form th:action="@{/register}" th:object="${userDto}" method="post" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">First Name</label>
                        <input type="text" th:field="*{firstName}" class="input-field" placeholder="John" required>
                        <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></p>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">Last Name</label>
                        <input type="text" th:field="*{lastName}" class="input-field" placeholder="Doe" required>
                        <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></p>
                    </div>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">Email address</label>
                    <input type="email" th:field="*{email}" class="input-field" placeholder="john@example.com" required>
                    <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                </div>
                
                <div>
                    <label class="block text-sm font-medium mb-1">Phone Number</label>
                    <input type="text" th:field="*{phone}" class="input-field" placeholder="555-0123" required>
                    <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">Password</label>
                    <input type="password" th:field="*{password}" class="input-field" placeholder="••••••••" required>
                    <p class="text-red-500 text-xs mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                </div>

                <button type="submit" class="btn-primary w-full py-2.5 mt-4">Create Account</button>
            </form>

            <div class="mt-6 text-center text-sm">
                <span class="text-gray-500">Already have an account?</span>
                <a th:href="@{/login}" class="text-primary font-medium hover:underline">Sign in</a>
            </div>
        </div>
    </main>

</body>
</html>
