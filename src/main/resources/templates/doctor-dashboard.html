<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Doctor Dashboard')}"></head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 hidden md:flex flex-col">
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-700">
            <i class="bi bi-heart-pulse-fill text-primary text-xl mr-2"></i>
            <span class="text-lg font-bold">VirtualQueue</span>
        </div>
        <nav class="flex-grow py-4 px-3 space-y-1">
            <a th:href="@{/doctor/dashboard}" class="flex items-center px-3 py-2 text-primary bg-primary/10 rounded-lg font-medium">
                <i class="bi bi-grid-1x2-fill mr-3"></i> Dashboard
            </a>
            <a th:href="@{/doctor/queue}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-list-ol mr-3"></i> Today's Queue
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200 dark:border-gray-700">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="flex items-center w-full px-3 py-2 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg font-medium transition-colors">
                    <i class="bi bi-box-arrow-right mr-3"></i> Logout
                </button>
            </form>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-6">
            <h1 class="text-xl font-semibold">Doctor Portal</h1>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="bi bi-moon"></i>
                </button>
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center font-bold">
                        Dr
                    </div>
                    <span class="ml-2 font-medium text-sm hidden sm:block" sec:authentication="name">Doctor</span>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="card p-6 border-l-4 border-blue-500">
                    <h3 class="text-sm font-medium text-gray-500">Appointments Today</h3>
                    <p class="text-3xl font-bold mt-2" th:text="${appointmentsToday}">0</p>
                </div>
                <div class="card p-6 border-l-4 border-yellow-500">
                    <h3 class="text-sm font-medium text-gray-500">Currently Waiting</h3>
                    <p class="text-3xl font-bold mt-2" th:text="${waiting}">0</p>
                </div>
                <div class="card p-6 border-l-4 border-green-500">
                    <h3 class="text-sm font-medium text-gray-500">Completed</h3>
                    <p class="text-3xl font-bold mt-2" th:text="${completed}">0</p>
                </div>
            </div>

            <div class="card p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold mb-4">Next Patient</h3>
                </div>
                <div class="bg-gray-50 dark:bg-gray-800 p-4 rounded-lg border border-gray-200 dark:border-gray-700">
                    <div th:if="${nextPatient != null}">
                        <div class="flex items-center mb-6">
                            <div class="w-16 h-16 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center text-xl font-bold mr-4">
                                <span th:text="${nextPatient.queueNumber}">1</span>
                            </div>
                            <div>
                                <h4 class="text-xl font-bold" th:text="${nextPatient.appointment.patient.firstName + ' ' + nextPatient.appointment.patient.lastName}">John Doe</h4>
                                <p class="text-gray-500" th:text="${nextPatient.appointment.reason}">Regular Checkup</p>
                            </div>
                        </div>
                        <form th:action="@{/doctor/queue/next}" method="post">
                            <button type="submit" class="btn-primary w-full py-3 text-lg font-bold shadow-lg shadow-primary/30">
                                Call Next Patient <i class="bi bi-megaphone-fill ml-2"></i>
                            </button>
                        </form>
                    </div>
                    <div th:if="${nextPatient == null}" class="py-8 text-center text-gray-500">
                        <i class="bi bi-emoji-smile text-4xl mb-3 block text-gray-300"></i>
                        <p>No more patients in the waiting queue.</p>
                    </div>
                </div>
            </div>

        </main>
    </div>

</body>
</html>
