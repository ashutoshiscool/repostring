<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Patient Details')}"></head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col md:flex-row">

    <!-- Sidebar -->
    <aside class="w-full md:w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex-col hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-700">
            <i class="bi bi-heart-pulse-fill text-primary text-xl mr-2"></i>
            <span class="text-lg font-bold">VirtualQueue</span>
        </div>
        <nav class="flex-grow py-4 px-3 space-y-1">
            <a th:href="@{/doctor/dashboard}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-grid-1x2-fill mr-3"></i> Dashboard
            </a>
            <a th:href="@{/doctor/queue}" class="flex items-center px-3 py-2 text-primary bg-primary/10 rounded-lg font-medium">
                <i class="bi bi-list-ol mr-3"></i> Today's Queue
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200 dark:border-gray-700">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="flex items-center w-full px-3 py-2 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg font-medium transition-colors">
                    <i class="bi bi-box-arrow-right mr-3"></i> Logout
                </button>
            </form>
        </div>
    </aside>

    <!-- Mobile Nav Header -->
    <div class="md:hidden flex items-center justify-between p-4 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
        <div class="flex items-center">
            <i class="bi bi-heart-pulse-fill text-primary text-xl mr-2"></i>
            <span class="text-lg font-bold">VirtualQueue</span>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="text-red-500"><i class="bi bi-box-arrow-right text-xl"></i></button>
        </form>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 hidden md:flex items-center justify-between px-6">
            <div class="flex items-center">
                <a th:href="@{/doctor/queue}" class="text-gray-500 hover:text-primary mr-4"><i class="bi bi-arrow-left text-xl"></i></a>
                <h1 class="text-xl font-semibold">Patient Details</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="bi bi-moon"></i>
                </button>
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-blue-500 text-white flex items-center justify-center font-bold">
                        Dr
                    </div>
                    <span class="ml-2 font-medium text-sm hidden sm:block" sec:authentication="name">Doctor</span>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-6">
            <div class="max-w-3xl mx-auto">
                <div class="card p-6 md:p-8">
                    <div class="flex items-center mb-8 border-b border-gray-200 dark:border-gray-700 pb-6">
                        <div class="w-20 h-20 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-3xl font-bold mr-6">
                            <span th:text="${#strings.substring(patient.firstName, 0, 1)}">P</span>
                        </div>
                        <div>
                            <h2 class="text-2xl font-bold text-gray-800 dark:text-white" th:text="${patient.firstName + ' ' + patient.lastName}">Jane Smith</h2>
                            <p class="text-gray-500 flex items-center mt-1">
                                <i class="bi bi-telephone-fill mr-2"></i> <span th:text="${patient.phone}">+1234567890</span>
                            </p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4">Personal Information</h3>
                            <ul class="space-y-4">
                                <li>
                                    <span class="block text-sm text-gray-500">Email</span>
                                    <span class="font-medium text-gray-900 dark:text-gray-100" th:text="${patient.user.email}">email@example.com</span>
                                </li>
                                <li>
                                    <span class="block text-sm text-gray-500">Date of Birth</span>
                                    <span class="font-medium text-gray-900 dark:text-gray-100" th:text="${patient.dob != null ? patient.dob : 'Not Provided'}">01/01/1990</span>
                                </li>
                            </ul>
                        </div>
                        
                        <div>
                            <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4">Medical Information</h3>
                            <ul class="space-y-4">
                                <li>
                                    <span class="block text-sm text-gray-500">Blood Group</span>
                                    <span class="inline-block mt-1 px-3 py-1 bg-red-100 text-red-700 rounded-full font-bold text-sm" th:text="${patient.bloodGroup != null and !patient.bloodGroup.isEmpty() ? patient.bloodGroup : 'Unknown'}">O+</span>
                                </li>
                                <li>
                                    <span class="block text-sm text-gray-500">Gender</span>
                                    <span class="font-medium text-gray-900 dark:text-gray-100" th:text="${patient.gender != null ? patient.gender : 'Not Provided'}">Female</span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
