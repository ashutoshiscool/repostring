<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | Virtual Queue'">Virtual Queue</title>
    <!-- Tailwind CSS (CDN for simplicity) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: ['class', '[data-theme="dark"]'],
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        'primary-hover': '#4338CA',
                    }
                }
            }
        }
    </script>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Toastify CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <!-- Theme JS -->
    <script th:src="@{/js/theme.js}" defer></script>
    <!-- Table Search JS -->
    <script th:src="@{/js/table-search.js}" defer></script>
    <!-- Toastify JS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <!-- Notifications Script -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('success')) {
                let msg = urlParams.get('success');
                if (msg === 'deleted') msg = 'Successfully deleted record.';
                if (msg === 'availability_updated') msg = 'Availability updated successfully.';
                Toastify({
                    text: msg || "Success!",
                    duration: 3000,
                    close: true,
                    gravity: "top", 
                    position: "right",
                    style: { background: "linear-gradient(to right, #00b09b, #96c93d)" }
                }).showToast();
            }
            if (urlParams.has('error')) {
                Toastify({
                    text: urlParams.get('error') || "An error occurred.",
                    duration: 3000,
                    close: true,
                    gravity: "top", 
                    position: "right",
                    style: { background: "linear-gradient(to right, #ff5f6d, #ffc371)" }
                }).showToast();
            }
        });
    </script>
</head>
<body>
    <nav th:fragment="navbar" class="glass-panel sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i class="bi bi-heart-pulse-fill text-primary text-2xl"></i>
            <span class="text-xl font-bold tracking-tight">VirtualQueue</span>
        </div>
        <div class="flex items-center space-x-4">
            <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-colors">
                <i class="bi bi-moon"></i>
            </button>
            <div th:if="${#authorization.expression('isAuthenticated()')}">
                <a th:href="@{/dashboard}" class="btn-primary text-sm">Dashboard</a>
                <a th:href="@{/logout}" class="ml-2 text-sm text-red-500 hover:text-red-700 font-medium">Logout</a>
            </div>
            <div th:unless="${#authorization.expression('isAuthenticated()')}">
                <a th:href="@{/login}" class="text-sm font-medium mr-4">Login</a>
                <a th:href="@{/register}" class="btn-primary text-sm">Sign Up</a>
            </div>
        </div>
    </nav>

    <footer th:fragment="footer" class="py-8 text-center text-sm text-gray-500 dark:text-gray-400 mt-auto border-t border-gray-200 dark:border-gray-800">
        <p>&copy; 2026 Virtual Queue Management System. All rights reserved.</p>
    </footer>
</body>
</html>
