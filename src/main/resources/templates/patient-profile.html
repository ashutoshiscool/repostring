<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('My Profile')}"></head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col md:flex-row">

    <!-- Sidebar -->
    <aside class="w-full md:w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex-col hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-700">
            <i class="bi bi-heart-pulse-fill text-primary text-xl mr-2"></i>
            <span class="text-lg font-bold">VirtualQueue</span>
        </div>
        <nav class="flex-grow py-4 px-3 space-y-1">
            <a th:href="@{/patient/dashboard}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-grid-1x2-fill mr-3"></i> Dashboard
            </a>
            <a th:href="@{/patient/book-appointment}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-calendar-plus mr-3"></i> Book Appointment
            </a>
            <a th:href="@{/patient/appointments}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-journal-medical mr-3"></i> My Appointments
            </a>
            <a th:href="@{/patient/profile}" class="flex items-center px-3 py-2 text-primary bg-primary/10 rounded-lg font-medium">
                <i class="bi bi-person-fill mr-3"></i> My Profile
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200 dark:border-gray-700">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="flex items-center w-full px-3 py-2 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg font-medium transition-colors">
                    <i class="bi bi-box-arrow-right mr-3"></i> Logout
                </button>
            </form>
        </div>
    </aside>

    <!-- Mobile Nav Header -->
    <div class="md:hidden flex items-center justify-between p-4 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
        <div class="flex items-center">
            <i class="bi bi-heart-pulse-fill text-primary text-xl mr-2"></i>
            <span class="text-lg font-bold">VirtualQueue</span>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="text-red-500"><i class="bi bi-box-arrow-right text-xl"></i></button>
        </form>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 hidden md:flex items-center justify-between px-6">
            <h1 class="text-xl font-semibold">My Profile</h1>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="bi bi-moon"></i>
                </button>
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-green-500 text-white flex items-center justify-center font-bold" th:text="${patient != null ? #strings.substring(patient.firstName, 0, 1) : 'P'}">
                        P
                    </div>
                    <span class="ml-2 font-medium text-sm hidden sm:block" sec:authentication="name">Patient User</span>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-6">
            <div class="max-w-2xl mx-auto">
                <div class="card p-6 md:p-8">
                    <h2 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white border-b border-gray-200 dark:border-gray-700 pb-4">Edit Profile</h2>
                    
                    <div th:if="${param.success}" class="mb-6 p-4 bg-green-50 text-green-700 rounded-lg border border-green-200 flex items-center">
                        <i class="bi bi-check-circle-fill mr-3 text-lg"></i>
                        <span>Profile updated successfully!</span>
                    </div>

                    <form th:action="@{/patient/profile/update}" method="post" class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">First Name</label>
                                <input type="text" th:value="${patient.firstName}" disabled class="input-field bg-gray-100 dark:bg-gray-700 opacity-70">
                                <p class="text-xs text-gray-500 mt-1">Name cannot be changed.</p>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Last Name</label>
                                <input type="text" th:value="${patient.lastName}" disabled class="input-field bg-gray-100 dark:bg-gray-700 opacity-70">
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email</label>
                            <input type="email" th:value="${patient.user.email}" disabled class="input-field bg-gray-100 dark:bg-gray-700 opacity-70">
                            <p class="text-xs text-gray-500 mt-1">Email is used for login and cannot be changed.</p>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label for="phone" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Phone Number</label>
                                <input type="tel" id="phone" name="phone" th:value="${patient.phone}" required class="input-field focus:ring-2 focus:ring-primary focus:border-primary">
                            </div>
                            <div>
                                <label for="dob" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Date of Birth</label>
                                <input type="date" id="dob" name="dob" th:value="${patient.dob}" class="input-field focus:ring-2 focus:ring-primary focus:border-primary">
                            </div>
                        </div>

                        <div>
                            <label for="bloodGroup" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Blood Group</label>
                            <select id="bloodGroup" name="bloodGroup" class="input-field focus:ring-2 focus:ring-primary focus:border-primary">
                                <option value="">Select Blood Group</option>
                                <option value="A+" th:selected="${patient.bloodGroup == 'A+'}">A+</option>
                                <option value="A-" th:selected="${patient.bloodGroup == 'A-'}">A-</option>
                                <option value="B+" th:selected="${patient.bloodGroup == 'B+'}">B+</option>
                                <option value="B-" th:selected="${patient.bloodGroup == 'B-'}">B-</option>
                                <option value="AB+" th:selected="${patient.bloodGroup == 'AB+'}">AB+</option>
                                <option value="AB-" th:selected="${patient.bloodGroup == 'AB-'}">AB-</option>
                                <option value="O+" th:selected="${patient.bloodGroup == 'O+'}">O+</option>
                                <option value="O-" th:selected="${patient.bloodGroup == 'O-'}">O-</option>
                            </select>
                        </div>

                        <div class="pt-4 border-t border-gray-200 dark:border-gray-700 flex justify-end">
                            <button type="submit" class="btn-primary py-2 px-6">
                                <i class="bi bi-save mr-2"></i> Save Changes
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
