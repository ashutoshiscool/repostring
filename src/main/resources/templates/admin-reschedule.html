<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Reschedule Appointment')}"></head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex flex-col md:flex-row">

    <!-- Sidebar -->
    <aside class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 hidden md:flex flex-col">
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-700">
            <i class="bi bi-heart-pulse-fill text-primary text-xl mr-2"></i>
            <span class="text-lg font-bold">VirtualQueue</span>
        </div>
        <nav class="flex-grow py-4 px-3 space-y-1">
            <a th:href="@{/admin/dashboard}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-grid-1x2-fill mr-3"></i> Dashboard
            </a>
            <a th:href="@{/admin/doctors}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-person-badge mr-3"></i> Manage Doctors
            </a>
            <a th:href="@{/admin/patients}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-people mr-3"></i> Manage Patients
            </a>
            <a th:href="@{/admin/appointments}" class="flex items-center px-3 py-2 text-primary bg-primary/10 rounded-lg font-medium">
                <i class="bi bi-calendar-event mr-3"></i> Appointments
            </a>
            <a th:href="@{/admin/queues}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-list-ol mr-3"></i> Live Queues
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200 dark:border-gray-700">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="flex items-center w-full px-3 py-2 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg font-medium transition-colors">
                    <i class="bi bi-box-arrow-right mr-3"></i> Logout
                </button>
            </form>
        </div>
    </aside>

    <!-- Mobile Nav Header -->
    <div class="md:hidden flex items-center justify-between p-4 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
        <div class="flex items-center">
            <i class="bi bi-heart-pulse-fill text-primary text-xl mr-2"></i>
            <span class="text-lg font-bold">VirtualQueue</span>
        </div>
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="text-red-500"><i class="bi bi-box-arrow-right text-xl"></i></button>
        </form>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 hidden md:flex items-center justify-between px-6">
            <div class="flex items-center">
                <a th:href="@{/admin/appointments}" class="text-gray-500 hover:text-primary mr-4"><i class="bi bi-arrow-left text-xl"></i></a>
                <h1 class="text-xl font-semibold">Reschedule Appointment (Admin)</h1>
            </div>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="bi bi-moon"></i>
                </button>
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold">
                        A
                    </div>
                    <span class="ml-2 font-medium text-sm hidden sm:block" sec:authentication="name">Admin User</span>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-6">
            <div class="max-w-xl mx-auto">
                <div class="card p-6 md:p-8">
                    <h2 class="text-2xl font-bold mb-6 text-gray-800 dark:text-white">Admin Reschedule</h2>
                    
                    <div class="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-lg mb-6 border border-blue-100 dark:border-blue-800">
                        <p class="text-sm text-blue-800 dark:text-blue-200">
                            <strong>Patient:</strong> <span th:text="${appointment.patient.firstName + ' ' + appointment.patient.lastName}">Patient Name</span><br>
                            <strong>Doctor:</strong> <span th:text="${'Dr. ' + appointment.doctor.lastName}">Dr. Name</span><br>
                            <strong>Original Date:</strong> <span th:text="${appointment.appointmentDate}">2026-10-10</span><br>
                            <strong>Original Time:</strong> <span th:text="${appointment.timeSlot}">10:00 AM</span>
                        </p>
                    </div>

                    <form th:action="@{/admin/appointments/{id}/reschedule(id=${appointment.id})}" method="post" class="space-y-6">
                        <div>
                            <label for="appointmentDate" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">New Date</label>
                            <input type="date" id="appointmentDate" name="appointmentDate" required th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" th:value="${appointment.appointmentDate}" class="input-field focus:ring-2 focus:ring-primary focus:border-primary">
                        </div>

                        <div>
                            <label for="timeSlot" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">New Time Slot</label>
                            <select id="timeSlot" name="timeSlot" required class="input-field focus:ring-2 focus:ring-primary focus:border-primary">
                                <option value="09:00" th:selected="${#strings.equals(appointment.timeSlot, '09:00')}">09:00 AM</option>
                                <option value="09:30" th:selected="${#strings.equals(appointment.timeSlot, '09:30')}">09:30 AM</option>
                                <option value="10:00" th:selected="${#strings.equals(appointment.timeSlot, '10:00')}">10:00 AM</option>
                                <option value="10:30" th:selected="${#strings.equals(appointment.timeSlot, '10:30')}">10:30 AM</option>
                                <option value="11:00" th:selected="${#strings.equals(appointment.timeSlot, '11:00')}">11:00 AM</option>
                                <option value="11:30" th:selected="${#strings.equals(appointment.timeSlot, '11:30')}">11:30 AM</option>
                                <option value="12:00" th:selected="${#strings.equals(appointment.timeSlot, '12:00')}">12:00 PM</option>
                                <option value="14:00" th:selected="${#strings.equals(appointment.timeSlot, '14:00')}">02:00 PM</option>
                                <option value="14:30" th:selected="${#strings.equals(appointment.timeSlot, '14:30')}">02:30 PM</option>
                                <option value="15:00" th:selected="${#strings.equals(appointment.timeSlot, '15:00')}">03:00 PM</option>
                                <option value="15:30" th:selected="${#strings.equals(appointment.timeSlot, '15:30')}">03:30 PM</option>
                                <option value="16:00" th:selected="${#strings.equals(appointment.timeSlot, '16:00')}">04:00 PM</option>
                                <option value="16:30" th:selected="${#strings.equals(appointment.timeSlot, '16:30')}">04:30 PM</option>
                            </select>
                        </div>
                        
                        <div class="pt-4 border-t border-gray-200 dark:border-gray-700 flex justify-end">
                            <a th:href="@{/admin/appointments}" class="btn bg-gray-200 hover:bg-gray-300 text-gray-800 py-2 px-6 mr-3">Cancel</a>
                            <button type="submit" class="btn-primary py-2 px-6">
                                <i class="bi bi-calendar-check mr-2"></i> Save Reschedule
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
