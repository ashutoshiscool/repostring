<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Manage Patients')}"></head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen flex">

    <!-- Sidebar -->
    <aside class="w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 hidden md:flex flex-col">
        <div class="h-16 flex items-center px-6 border-b border-gray-200 dark:border-gray-700">
            <i class="bi bi-heart-pulse-fill text-primary text-xl mr-2"></i>
            <span class="text-lg font-bold">VirtualQueue</span>
        </div>
        <nav class="flex-grow py-4 px-3 space-y-1">
            <a th:href="@{/admin/dashboard}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-grid-1x2-fill mr-3"></i> Dashboard
            </a>
            <a th:href="@{/admin/doctors}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-person-badge mr-3"></i> Manage Doctors
            </a>
            <a th:href="@{/admin/patients}" class="flex items-center px-3 py-2 text-primary bg-primary/10 rounded-lg font-medium">
                <i class="bi bi-people mr-3"></i> Manage Patients
            </a>
            <a th:href="@{/admin/appointments}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-calendar-event mr-3"></i> Appointments
            </a>
            <a th:href="@{/admin/queues}" class="flex items-center px-3 py-2 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg font-medium transition-colors">
                <i class="bi bi-list-ol mr-3"></i> Live Queues
            </a>
        </nav>
        <div class="p-4 border-t border-gray-200 dark:border-gray-700">
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="flex items-center w-full px-3 py-2 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg font-medium transition-colors">
                    <i class="bi bi-box-arrow-right mr-3"></i> Logout
                </button>
            </form>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <!-- Top header -->
        <header class="h-16 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700 flex items-center justify-between px-6">
            <h1 class="text-xl font-semibold">Manage Patients</h1>
            <div class="flex items-center space-x-4">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700">
                    <i class="bi bi-moon"></i>
                </button>
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold">
                        A
                    </div>
                    <span class="ml-2 font-medium text-sm hidden sm:block" sec:authentication="name">Admin User</span>
                </div>
            </div>
        </header>

        <!-- Main section -->
        <main class="flex-1 overflow-y-auto p-6">
            <div class="card p-6">
                <div class="flex flex-col sm:flex-row justify-between items-center mb-6 space-y-4 sm:space-y-0">
                    <h2 class="text-lg font-bold">All Patients</h2>
                    <div class="flex items-center space-x-4">
                        <div class="relative">
                            <i class="bi bi-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                            <input type="text" data-table-search="patientsTable" placeholder="Search patients..." class="pl-10 pr-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-gray-50 dark:bg-gray-700 text-sm focus:outline-none focus:ring-2 focus:ring-primary w-full sm:w-64 transition-all">
                        </div>
                        <button class="btn-primary py-2 px-4 text-sm whitespace-nowrap"><i class="bi bi-plus-lg mr-2"></i>Add Patient</button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table id="patientsTable" class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-sm text-gray-500 border-b border-gray-200 dark:border-gray-700">
                                <th class="pb-3 font-medium">Name</th>
                                <th class="pb-3 font-medium">Email</th>
                                <th class="pb-3 font-medium">Gender</th>
                                <th class="pb-3 font-medium">Blood Group</th>
                                <th class="pb-3 font-medium">Phone</th>
                                <th class="pb-3 font-medium text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="text-sm">
                            <tr th:if="${#lists.isEmpty(patients)}">
                                <td colspan="6" class="py-4 text-center text-gray-500">No patients found.</td>
                            </tr>
                            <tr th:each="patient : ${patients}" class="border-b border-gray-100 dark:border-gray-800">
                                <td class="py-3 font-medium" th:text="${patient.firstName + ' ' + patient.lastName}">Jane Doe</td>
                                <td class="py-3 text-gray-500 dark:text-gray-400" th:text="${patient.user.email}">pat@mail.com</td>
                                <td class="py-3" th:text="${patient.gender}">Female</td>
                                <td class="py-3">
                                    <span class="px-2 py-1 bg-red-100 text-red-700 rounded-full text-xs font-medium" th:text="${patient.bloodGroup}">O+</span>
                                </td>
                                <td class="py-3" th:text="${patient.phone}">555-1234</td>
                                <td class="py-3 text-right flex justify-end space-x-2">
                                    <form th:action="@{/admin/patients/delete/{id}(id=${patient.id})}" method="post" onsubmit="return confirm('Are you sure you want to delete this patient?');">
                                        <button type="submit" class="text-red-600 hover:text-red-800"><i class="bi bi-trash"></i></button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
