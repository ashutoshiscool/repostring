<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Server Error')}"></head>
<body class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900">
    <div class="text-center p-8">
        <h1 class="text-6xl font-bold text-red-500 mb-4">500</h1>
        <h2 class="text-2xl font-bold mb-2">Internal Server Error</h2>
        <p class="text-gray-500 mb-6" th:text="${errorMsg}">Something went wrong on our end.</p>
        <a th:href="@{/}" class="btn-primary">Return Home</a>
    </div>
</body>
</html>
