<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Login')}"></head>
<body class="min-h-screen flex flex-col bg-gray-50 dark:bg-gray-900">
    
    <nav th:replace="~{fragments :: navbar}"></nav>

    <main class="flex-grow flex items-center justify-center p-6 relative">
        <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-br from-primary/5 to-purple-500/5 z-0"></div>
        
        <div class="card p-8 w-full max-w-md z-10 glass-panel">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary/10 text-primary mb-4">
                    <i class="bi bi-box-arrow-in-right text-2xl"></i>
                </div>
                <h2 class="text-3xl font-bold">Welcome back</h2>
                <p class="text-gray-500 dark:text-gray-400 mt-2">Sign in to your account</p>
            </div>

            <div th:if="${param.error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4" role="alert">
                <span class="block sm:inline">Invalid email or password.</span>
            </div>
            <div th:if="${param.logout}" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative mb-4" role="alert">
                <span class="block sm:inline">You have been logged out.</span>
            </div>

            <form th:action="@{/login}" method="post" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium mb-1">Email address</label>
                    <input type="email" id="username" name="username" class="input-field" placeholder="Enter your email" required autofocus>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label for="password" class="block text-sm font-medium">Password</label>
                        <a href="#" class="text-sm text-primary hover:underline">Forgot password?</a>
                    </div>
                    <input type="password" id="password" name="password" class="input-field" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary w-full py-2.5 mt-2">Sign In</button>
            </form>

            <div class="mt-6 text-center text-sm">
                <span class="text-gray-500">Don't have an account?</span>
                <a th:href="@{/register}" class="text-primary font-medium hover:underline">Register now</a>
            </div>
        </div>
    </main>

</body>
</html>
