<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900">
    <div class="text-center p-8">
        <h1 class="text-6xl font-bold text-primary mb-4">404</h1>
        <h2 class="text-2xl font-bold mb-2">Page Not Found</h2>
        <p class="text-gray-500 mb-6">The page you are looking for does not exist or has been moved.</p>
        <a th:href="@{/}" class="bg-primary hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">Return Home</a>
    </div>
</body>
</html>
